name: Security Background

env:
  CARGO_AUDIT_VERSION: "0.22.1"

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore Rust audit caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-
            cargo-audit-${{ runner.os }}-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        shell: bash
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked --debug
          fi

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings
